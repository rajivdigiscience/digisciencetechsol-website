<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101d"/>
      <stop offset="1" stop-color="#0b1627"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="120" x2="500" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EA8FF"/>
      <stop offset="1" stop-color="#84F0DA"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="140" fill="#84F0DA" fill-opacity="0.08"/>
  <circle cx="140" cy="520" r="180" fill="#5EA8FF" fill-opacity="0.08"/>
  <g filter="url(#glow)">
