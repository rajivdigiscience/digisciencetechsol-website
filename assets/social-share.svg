    <rect x="121" y="113" width="58" height="58" rx="18" stroke="white" stroke-opacity="0.45" stroke-width="3" transform="rotate(10 150 142)"/>
    <rect x="133" y="125" width="34" height="34" rx="10" stroke="white" stroke-opacity="0.7" stroke-width="3" transform="rotate(-10 150 142)"/>
  </g>
  <text x="96" y="280" fill="#ECF3FF" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">DigiScience Tech Solutions</text>
  <text x="96" y="350" fill="#9FB2D1" font-family="Arial, Helvetica, sans-serif" font-size="34">AI Architecture • Cloud Transformation • FinOps • Observability • Cloud AIOps</text>
  <text x="96" y="442" fill="#ECF3FF" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="600">Premium consulting for modern digital transformation</text>
  <rect x="96" y="496" width="520" height="58" rx="29" fill="#132742" stroke="#28476D"/>
  <text x="126" y="534" fill="#D7E5FF" font-family="Arial, Helvetica, sans-serif" font-size="28">digisciencetechsol.com</text>
